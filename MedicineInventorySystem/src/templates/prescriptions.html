<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <nav>
            <a href="/">Home</a>
            <a href="/medicines">Medicines</a>
            <a href="/patients">Patients</a>
            <a href="/prescriptions">Prescriptions</a>
            <a href="/bills">Bills</a>
        </nav>

        <header>
            <h1>Prescriptions</h1>
            <p class="muted">Add a simple prescription</p>
        </header>

        <form method="post" action="/prescriptions">
            <div class="form-row">
                <div>
                    <label for="patient_id">Patient</label>
                    <select id="patient_id" name="patient_id" required>
                        {% for p in patients %}
                        <option value="{{ p.patient_id }}">{{ p.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="medicine_id">Medicine</label>
                    <select id="medicine_id" name="medicine_id" required>
                        {% for m in medicines %}
                        <option value="{{ m.medicine_id }}">{{ m.medicine_name }} ({{ m.quantity }} in stock)</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" required>
                </div>
                <div>
                    <label for="dosage">Dosage</label>
                    <input type="text" id="dosage" name="dosage" required>
                </div>
                <div>
                    <label for="prescription_date">Date</label>
                    <input type="date" id="prescription_date" name="prescription_date" required>
                </div>
            </div>
            <button type="submit">Add Prescription</button>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in prescriptions %}
                    <tr>
                        <td>{{ item.prescription_id }}</td>
                        <td>{{ item.full_name }}</td>
                        <td>{{ item.prescription_date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
